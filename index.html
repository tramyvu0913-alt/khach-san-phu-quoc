<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Coast Hotel - Bãi Trường, Phú Quốc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1571896349842-33c89424de2d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center; }
        .bg-green-primary { background-color: #10b981; }
        .text-green-primary { color: #059669; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-green-primary rounded-lg flex items-center justify-center text-white"><i class="fas fa-leaf"></i></div>
                <span class="text-2xl font-bold text-emerald-900">EMERALD <span class="text-green-primary">COAST</span></span>
            </div>
            <div class="hidden md:block">
                <a href="#" class="bg-green-primary text-white px-6 py-2.5 rounded-full font-semibold">Đặt phòng ngay</a>
            </div>
        </div>
    </nav>
    <section class="hero-gradient h-screen flex items-center justify-center text-center text-white px-4">
        <div>
            <h1 class="text-5xl md:text-7xl font-bold mb-6">Nghỉ dưỡng xanh tại Bãi Trường</h1>
            <p class="text-xl mb-8">Trải nghiệm sự tươi mát và chuyên nghiệp tại Phú Quốc</p>
            <a href="#" class="bg-white text-emerald-900 px-8 py-4 rounded-xl font-bold">Khám phá ngay</a>
        </div>
    </section>
</body>
</html>
